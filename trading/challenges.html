<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenges · Trading — The Realms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="trading-body">

    <nav class="nav">
        <a class="nav-logo" href="../index.html">The Realms</a>
        <span class="nav-crumb">/ Trading</span>
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link nav-link-active" href="challenges.html">Challenges</a>
        <div class="nav-right">
            <span class="nav-status hidden" id="signedInIndicator">
                <span class="status-dot"></span>
                <span id="signedInEmail"></span>
            </span>
            <button class="nav-link hidden" id="signOutBtn">Sign Out</button>
            <button class="nav-link" id="signInBtn">Sign In</button>
        </div>
    </nav>

    <!-- ── Auth modal (same pattern as main site) ── -->
    <div class="overlay" id="authPopup" onclick="handleAuthOverlayClick(event)">
        <div class="qr-card auth-card">
            <button class="qr-close" onclick="toggleAuth()" aria-label="Close">&times;</button>
            <div class="auth-tabs" id="authTabs">
                <button type="button" class="mode-btn active" data-tab="signin">Sign In</button>
                <button type="button" class="mode-btn" data-tab="signup">Sign Up</button>
            </div>
            <div class="field">
                <label for="authEmail">Email</label>
                <input type="email" id="authEmail" placeholder="you@example.com">
            </div>
            <div class="field">
                <label for="authPassword">Password</label>
                <input type="password" id="authPassword" placeholder="••••••••">
            </div>
            <p class="auth-error" id="authError"></p>
            <button class="btn-primary" id="authSubmitBtn">Sign In</button>
            <div class="divider"><span>or</span></div>
            <button class="btn-google" id="googleBtn">
                <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.61z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.19l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.69A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.16.28-1.69V4.98H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.02l2.99-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.98l2.99 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
                Continue with Google
            </button>
        </div>
    </div>

    <!-- ── Create / Edit Challenge modal (shared) ── -->
    <div class="overlay" id="formPopup" onclick="handleFormOverlayClick(event)">
        <div class="qr-card auth-card">
            <button class="qr-close" onclick="toggleForm()" aria-label="Close">&times;</button>
            <p class="qr-title" style="margin-bottom:0;" id="formTitle">Start a Challenge</p>
            <div class="field">
                <label for="fName">Challenge name</label>
                <input type="text" id="fName" placeholder="e.g. $100 → $1,000">
            </div>
            <div class="field">
                <label for="fBalance">Starting balance</label>
                <input type="number" id="fBalance" placeholder="100" min="0" step="0.01">
            </div>
            <div class="field">
                <label for="fTarget">Daily target %</label>
                <input type="number" id="fTarget" placeholder="2" min="0.01" step="0.01">
            </div>
            <div class="field">
                <label for="fDuration">Duration (days)</label>
                <input type="number" id="fDuration" placeholder="30" min="1" step="1">
            </div>
            <p class="auth-error" id="formError"></p>
            <button class="btn-primary" id="formSubmitBtn">Create Challenge</button>
        </div>
    </div>

    <main class="dash-wrap">

        <section class="state-panel hidden" id="signedOutState">
            <h1 class="state-title">Manage your challenges</h1>
            <p class="state-sub">Sign in to create, edit, pause, or archive your growth challenges.</p>
            <button class="btn-primary" id="gateSignInBtn">Sign In</button>
        </section>

        <section class="hidden" id="managedState">
            <header class="dash-header">
                <div>
                    <p class="dash-eyebrow">Trading</p>
                    <h1 class="dash-title">Challenges</h1>
                </div>
                <div class="dash-actions">
                    <button class="btn-primary" id="newChallengeBtn">New Challenge</button>
                </div>
            </header>

            <div class="filter-row" id="filterRow">
                <button class="filter-chip active" data-filter="all">All</button>
                <button class="filter-chip" data-filter="active">Active</button>
                <button class="filter-chip" data-filter="paused">Paused</button>
                <button class="filter-chip" data-filter="completed">Completed</button>
                <button class="filter-chip" data-filter="archived">Archived</button>
            </div>

            <ul class="challenge-list" id="challengeList">
                <li class="activity-empty">No challenges yet — create one to get started.</li>
            </ul>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="challenges.js"></script>
</body>
</html>
